<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Landing Competition</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;900&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="css/style.css" />
</head>

<body>

    <!-- ======================== ROOT ======================== -->
    <div id="app" class="hidden">

        <!-- ========== VIEW: MAP ========== -->
        <div id="view-map" class="view">
            <div class="map-container">
                <!-- Mapa GTA V Background -->
                <div id="map-bg"></div>

                <!-- Marker animado da zona de aterragem -->
                <div id="landing-marker" class="marker-pulse">
                    <div class="marker-ring"></div>
                    <div class="marker-dot"></div>
                    <div class="marker-label" id="marker-label">–</div>
                </div>

                <!-- Overlay de info -->
                <div class="map-overlay">
                    <div class="map-header">
                        <div class="map-badge">✈️ LANDING COMPETITION</div>
                        <div class="timer-box">
                            <span class="timer-label">TEMPO</span>
                            <span id="hud-timer" class="timer-value">5:00</span>
                        </div>
                    </div>

                    <div class="info-panel">
                        <div class="info-row">
                            <span class="info-icon">✈️</span>
                            <span class="info-text">Avião: <strong id="plane-name">–</strong></span>
                        </div>
                        <div class="info-row">
                            <span class="info-icon">📍</span>
                            <span class="info-text">Destino: <strong id="zone-name">–</strong></span>
                        </div>
                        <div class="info-row hint-row">
                            <span class="info-icon">💬</span>
                            <span class="info-text" id="zone-hint">–</span>
                        </div>
                    </div>

                    <!-- Feed de aterragens -->
                    <div class="landed-feed" id="landed-feed"></div>
                </div>
            </div>
        </div>

        <!-- ========== VIEW: VOTING ========== -->
        <div id="view-voting" class="view hidden">
            <div class="voting-container">
                <div class="voting-header">
                    <h1>🗳️ Vota na Melhor Aterragem</h1>
                    <div class="vote-timer-wrap">
                        <span>Termina em</span>
                        <span id="vote-timer" class="vote-timer">60</span>s
                    </div>
                </div>

                <div class="cards-stack" id="cards-stack">
                    <!-- Cards injetados dinamicamente por voting.js -->
                </div>

                <div class="vote-buttons" id="vote-buttons">
                    <button id="btn-nope" class="btn-vote btn-nope" onclick="voteAction(false)">
                        <span>✗</span>
                    </button>
                    <div class="vote-info" id="vote-info">
                        <span id="vote-count">0</span> / <span id="vote-total">0</span>
                    </div>
                    <button id="btn-like" class="btn-vote btn-like" onclick="voteAction(true)">
                        <span>♥</span>
                    </button>
                </div>
            </div>
        </div>

        <!-- ========== VIEW: SCOREBOARD ========== -->
        <div id="view-scoreboard" class="view hidden">
            <div class="scoreboard-container">
                <div class="scoreboard-header">
                    <div class="trophy-icon">🏆</div>
                    <h1>Resultados Finais</h1>
                    <div id="zone-result-label" class="zone-result-label">–</div>
                </div>

                <div class="scoreboard-table-wrap">
                    <table class="scoreboard-table">
                        <thead>
                            <tr>
                                <th>#</th>
                                <th>Jogador</th>
                                <th>📍 Distância</th>
                                <th>💥 Dano</th>
                                <th>❤️ Votos</th>
                                <th>⭐ Total</th>
                            </tr>
                        </thead>
                        <tbody id="scoreboard-body"></tbody>
                    </table>
                </div>

                <!-- Categorias especiais -->
                <div class="special-awards" id="special-awards"></div>

                <p class="close-hint">Prima ESC para fechar</p>
            </div>
        </div>

    </div><!-- #app -->

    <!-- ========== COUNTDOWN OVERLAY ========== -->
    <div id="countdown-overlay" class="hidden">
        <div id="countdown-number">5</div>
    </div>

    <!-- ========== SCRIPTS ========== -->
    <script src="js/map.js"></script>
    <script src="js/voting.js"></script>
    <script src="js/scoreboard.js"></script>
    <script src="js/app.js"></script>
</body>

</html>
