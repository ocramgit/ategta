<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Landing Competition</title>

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="" />
    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <!-- ═══════════════════════════════════════
       VIEW 1: PICKER (apenas para o iniciador)
  ═══════════════════════════════════════ -->
    <div id="picker-view" class="view hidden">
        <div id="picker-header">
            <span class="picker-title">✈️ Escolhe o Ponto de Aterragem</span>
            <span class="picker-hint">Clica em qualquer ponto do mapa</span>
        </div>
        <div id="picker-map"></div>
        <div id="picker-confirm" class="hidden">
            <div id="picker-coords-label"></div>
            <button id="btn-confirm">✅ Confirmar este ponto</button>
        </div>
    </div>

    <!-- ═══════════════════════════════════════
       VIEW 2: HUD DE VOO
  ═══════════════════════════════════════ -->
    <div id="hud-view" class="view hidden">
        <!-- Countdown overlay (durante 10s iniciais) -->
        <div id="countdown-overlay">
            <div id="countdown-number">10</div>
            <div id="countdown-label">Prepara-te para descolar!</div>
        </div>

        <!-- HUD fixo no canto superior direito -->
        <div id="flight-hud">
            <div id="hud-plane-name"></div>
            <div id="hud-timer-label">TEMPO RESTANTE</div>
            <div id="hud-timer">05:00</div>
            <div id="hud-target-label">PONTO ALVO</div>
            <div id="hud-target-coords"></div>
        </div>

        <!-- Feed de aterragens -->
        <div id="feed-list"></div>
    </div>

    <!-- ═══════════════════════════════════════
       VIEW 3: RESULTADOS (estilo GeoGuessr)
  ═══════════════════════════════════════ -->
    <div id="results-view" class="view hidden">
        <div id="results-container">
            <div id="results-map-wrap">
                <div id="results-map"></div>
            </div>
            <div id="results-sidebar">
                <div id="results-title">🏆 Resultados Finais</div>
                <div id="results-ranking"></div>
                <div id="results-footer">
                    <div id="results-progress-bar">
                        <div id="results-progress-fill"></div>
                    </div>
                    <div id="results-close-hint">A fechar em <span id="results-countdown">30</span>s &nbsp;·&nbsp; ESC
                        para fechar</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/app.js"></script>
    <script src="js/picker.js"></script>
    <script src="js/map.js"></script>
    <script src="js/results.js"></script>
</body>

</html>
